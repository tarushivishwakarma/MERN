<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(206, 164, 246);
        }
    </style>
    <script>
        function message(){
            alert("Hello")
        }
        const buttonclick=()=>{
            document.getElementById("name").innerHTML="Tarushi"
        }
        const printName=()=>{
            const givename=String(document.getElementById("myname").value)
            document.getElementById("name1").innerHTML=givename
        }
        const sum=()=>{
            let num1 = document.getElementById("num1").value
            let num2 = document.getElementById("num2").value
            if ( num1 === "" || num2 === ""){
                document.getElementById("sum").innerHTML="Kindly input both numbers"
            }
            else{ 
                let a=Number(num1)
                let b=Number(num2)
                let c=a+b
                document.getElementById("sum").innerHTML=c
            }
        }
        const diff=()=>{
            let num1 = document.getElementById("num1").value
            let num2 = document.getElementById("num2").value
            if ( num1 === "" || num2 === ""){
                document.getElementById("diff").innerHTML="Kindly input both numbers"
            }
            else{ 
                let a=Number(num1)
                let b=Number(num2)
                let c=a-b
                document.getElementById("diff").innerHTML=c
            }
        }
        const mul=()=>{
            let num1 = document.getElementById("num1").value
            let num2 = document.getElementById("num2").value
            if ( num1 === "" || num2 === ""){
                document.getElementById("mul").innerHTML="Kindly input both numbers"
            }
            else{ 
                let a=Number(num1)
                let b=Number(num2)
                let c=a*b
                document.getElementById("mul").innerHTML=c
            }
        }
        const div=()=>{
            let num1 = document.getElementById("num1").value
            let num2 = document.getElementById("num2").value
            if ( num1 === "" || num2 === ""){
                document.getElementById("div").innerHTML="Kindly input both numbers"
            }
            else{ 
                let a=Number(num1)
                let b=Number(num2)
                let c=a/b
                document.getElementById("div").innerHTML=c
            }
        }
    </script>
</head>
<body>
    <input type="number" name="" id="num1" placeholder="Enter first number:">            
    <input type="number" name="" id="num2" placeholder="Enter second number:"><br><br>
    <button  onclick="sum()">Addition</button>
    <p id="sum"></p>
    <button  onclick="diff()">Substraction</button>
    <p id="diff"></p>
    <button  onclick="mul()">Multiplication</button>
    <p id="mul"></p>
    <button  onclick="div()">Division</button>
    <p id="div"></p>
    <input type="text" name="" id="myname">
    <button onclick="printName()">Add name</button>
    <p id="name1"></p>
    <button onmouseover="message()">Click me</button>
    <button onclick="buttonclick()">Name</button>
    <p id="name"></p>
</body>
</html>
